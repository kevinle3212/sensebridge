version: 2

# SenseBridge dependency ecosystems: SwiftPM (once app/ has a Package.swift or
# an Xcode project with package dependencies) and GitHub Actions. Those are the
# only ecosystems this serverless on-device Swift app depends on.

updates:
  - package-ecosystem: swift
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - swift
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
