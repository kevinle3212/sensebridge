name: CI

# Build and test the SenseBridge iOS app. Until the Swift app is scaffolded
# under app/, the build and test jobs detect the absence of a Swift package /
# Xcode project and no-op so main stays green; they start doing real work
# automatically once the project lands.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: |
          LATEST="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$LATEST" ] && sudo xcode-select -switch "$LATEST" || true

      - name: Local Swift package build and test
        run: |
          shopt -s nullglob
          for manifest in app/Packages/*/Package.swift; do
            dir="$(dirname "$manifest")"
            name="$(basename "$dir")"
            echo "== $dir =="
            (cd "$dir" && swift build && xcodebuild test -scheme "$name" -destination 'platform=macOS' | xcpretty && exit "${PIPESTATUS[0]}")
          done

      - name: Detect project layout
        id: detect
        run: |
          if compgen -G "Package.swift" >/dev/null || compgen -G "app/Package.swift" >/dev/null; then
            echo "kind=spm" >> "$GITHUB_OUTPUT"
          elif compgen -G "app/*.xcodeproj" >/dev/null || compgen -G "app/*.xcworkspace" >/dev/null; then
            echo "kind=xcode" >> "$GITHUB_OUTPUT"
          else
            echo "kind=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Swift build and test
        if: steps.detect.outputs.kind == 'spm'
        run: |
          swift build
          swift test

      - name: Xcode build and test
        if: steps.detect.outputs.kind == 'xcode'
        run: |
          PROJ=$(find app -maxdepth 1 \( -name '*.xcworkspace' -o -name '*.xcodeproj' \) -print -quit)
          FLAG=$([[ "$PROJ" == *.xcworkspace ]] && echo -workspace || echo -project)
          xcodebuild build test \
            "$FLAG" "$PROJ" \
            -scheme SenseBridge \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit "${PIPESTATUS[0]}"

      - name: No app yet
        if: steps.detect.outputs.kind == 'none'
        run: echo "No Swift package or Xcode project found under app/ yet — skipping build."

  lint:
    name: Lint (SwiftFormat + SwiftLint)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Install SwiftLint and SwiftFormat
        run: brew install swiftlint swiftformat
      - name: Run scripts/lint.sh
        run: scripts/lint.sh

  docs-links:
    name: Docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check mirrored skills match canonical
        run: node tools/sync-skills.mjs --check
      - name: Check relative Markdown links resolve
        # Skips **/skills/* — skill/template content (e.g. vendored bmad-*
        # skills) intentionally contains placeholder links ({{path}},
        # ./filename.ext) that are examples, not real navigable docs.
        # Also skips links to gitignored targets (GAPS.md, sessions/,
        # docs/planning/, security/THREAT-MODEL.md, NOTES.local.md, ...):
        # those are intentionally local-only reference docs that never reach
        # the CI checkout, so their absence there isn't a broken link.
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            while read -r link; do
              case "$link" in
                http*|mailto:*|//*) continue ;;
              esac
              target="$(dirname "$file")/$link"
              if [ ! -e "$target" ] && ! git check-ignore -q "$target"; then
                echo "::error file=$file::broken relative link -> $link"
                fail=1
              fi
            done < <(grep -oE '\]\(([^)#]+)' "$file" | sed -E 's/^\]\(//')
          done < <(find . -path ./.git -prune -o -path '*/skills/*' -prune -o -name '*.md' -print0)
          exit $fail
