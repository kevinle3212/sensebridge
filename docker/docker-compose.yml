# Local-only tooling — not used by Railway (which builds docker/Dockerfile
# directly from railway.toml). Run from the repo root:
#   docker compose -f docker/docker-compose.yml up dev   # hot-reload dev server
#   docker compose -f docker/docker-compose.yml up web   # prod image, as deployed
services:
  # Astro dev server with hot reload — mirrors `npm run dev` inside website/,
  # without needing Node installed on the host.
  dev:
    image: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../website:/app
      - website_node_modules:/app/node_modules
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: development

  # Production image, as deployed to Railway — build + nginx runtime.
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"

volumes:
  website_node_modules:
